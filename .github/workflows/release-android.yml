name: release android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build:
    name: build release apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/release.keystore

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Firebase Options (Mock)
        run: |
          if [ ! -f lib/firebase_options.dart ]; then
            echo "class DefaultFirebaseOptions { static var currentPlatform; }" > lib/firebase_options.dart
            echo "Warning: firebase_options.dart was missing. Created a mock for compilation."
          fi

      - name: Build Android Release Assets
        run: |
          # Create dummy .env if missing (required by pubspec.yaml assets)
          if [ ! -f .env ]; then
            echo "CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" > .env
            echo "CONVEX_URL=${{ secrets.CONVEX_URL }}" >> .env
            echo "Mock .env created for compilation."
          fi

          # Create dummy google-services.json if missing (required by Firebase plugin)
          if [ ! -f android/app/google-services.json ]; then
            echo '{"project_info":{"project_number":"0","project_id":"mock","storage_bucket":"mock"},"client":[{"client_info":{"mobilesdk_app_id":"mock","android_client_info":{"package_name":"com.rem.rem"}},"api_key":[{"current_key":"mock"}]}]}' > android/app/google-services.json
            echo "Mock google-services.json created for compilation."
          fi

          # Build APK for direct download
          flutter build apk --release --obfuscate --split-debug-info=build/debug-info
          
          # Collect Android Assets
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/rem-android.apk
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Zip Chrome Extension
        working-directory: .
        run: |
          # Zip extension folder from project root
          zip -r rem-extension.zip extension/
          # Move it to the dist folder inside apps/mobile
          cp rem-extension.zip apps/mobile/dist/

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: apps/mobile/dist/

  release:
    name: create release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'production')

    steps:
      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rem-android.apk
            rem-extension.zip
          generate_release_notes: true
          draft: ${{ github.event.inputs.track != 'production' && github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ github.event.inputs.track == 'alpha' || github.event.inputs.track == 'beta' }}
          body: |
            ## Changes in this release
            See the [changelog](https://github.com/${{ github.repository }}/releases) for details.

            ### Installation
            Download the `rem-android.apk` for Android or unzip `rem-extension.zip` for Chrome.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Draft Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release edit ${{ github.ref_name }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
