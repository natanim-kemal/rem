name: release android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write

jobs:
  build:
    name: build release apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/release.keystore

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Real Configs
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          # Create real .env from secrets
          echo "CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" > .env
          echo "CONVEX_URL=${{ secrets.CONVEX_URL }}" >> .env
          echo "CLERK_ISSUER_URL=${{ secrets.CLERK_ISSUER_URL }}" >> .env
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          
          # Create real google-services.json from env var
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          
          # Create firebase_options.dart if provided in env var
          if [ ! -z "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          fi

      - name: Build Android Release Assets
        run: |
          # Build APK for direct download
          flutter build apk --release \
            --dart-define=CONVEX_URL=${{ secrets.CONVEX_URL }} \
            --dart-define=CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --dart-define=CLERK_ISSUER_URL=${{ secrets.CLERK_ISSUER_URL }} \
            --obfuscate --split-debug-info=build/debug-info
          
          # Collect Android Assets
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/rem-android.apk

      - name: Zip Chrome Extension
        working-directory: .
        run: |
          # Zip extension folder from project root
          zip -r rem-extension.zip extension/
          # Move it to the dist folder inside apps/mobile
          cp rem-extension.zip apps/mobile/dist/

      - name: Upload Release Assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: apps/mobile/dist/

  release:
    name: create release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'production')

    steps:
      - name: Download Release Assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            rem-android.apk
            rem-extension.zip
          generate_release_notes: true
          draft: ${{ github.event.inputs.track != 'production' && github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ github.event.inputs.track == 'alpha' || github.event.inputs.track == 'beta' }}
          body: |
            ## Changes in this release
            See the [changelog](https://github.com/${{ github.repository }}/releases) for details.

            ### Installation
            Download the `rem-android.apk` for Android or unzip `rem-extension.zip` for Chrome.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

