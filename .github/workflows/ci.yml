name: rem
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flutter:
    name: flutter 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy .env
        run: |
          touch .env
          echo "CONVEX_URL=https://dummy.convex.cloud" >> .env
          echo "CLERK_PUBLISHABLE_KEY=pk_test_dummy" >> .env

      - name: Create Firebase options
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-api-key',
                appId: 'ci-app-id',
                messagingSenderId: 'ci-sender-id',
                projectId: 'ci-project',
              );
            }
          }
          EOF

      - name: Create dummy google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "ci-project",
              "storage_bucket": "ci-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890",
                  "android_client_info": {
                    "package_name": "com.rem.rem"
                  }
                },
                "api_key": [
                  {
                    "current_key": "ci-api-key"
                  }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check format
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/mobile/coverage/lcov.info
          fail_ci_if_error: false

  convex:
    name: convex 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check Convex
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex codegen

  extension:
    name: extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          if [ ! -f manifest.json ]; then
            echo "manifest.json not found"
            exit 1
          fi
          cat manifest.json | python -m json.tool > /dev/null
          echo "Manifest valid"

  sast:
    name: security-sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/setup@master
      - name: Snyk Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --all-projects --severity-threshold=high || true
          # Note: Added || true to prevent blocking if tokens are not set yet, 
          # move to strict mode once SNYK_TOKEN is in secrets.

  dast:
    name: security-dast
    runs-on: ubuntu-latest
    if: vars.PREVIEW_URL != ''
    steps:
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ vars.PREVIEW_URL }}
          fail_action: false 

  build-android:
    name: build android
    runs-on: ubuntu-latest
    needs: [flutter, sast]
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy .env
        run: |
          touch .env
          echo "CONVEX_URL=https://dummy.convex.cloud" >> .env
          echo "CLERK_PUBLISHABLE_KEY=pk_test_dummy" >> .env

      - name: Create Firebase options
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-api-key',
                appId: 'ci-app-id',
                messagingSenderId: 'ci-sender-id',
                projectId: 'ci-project',
              );
            }
          }
          EOF

      - name: Create dummy google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "ci-project",
              "storage_bucket": "ci-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890",
                  "android_client_info": {
                    "package_name": "com.rem.rem"
                  }
                },
                "api_key": [
                  {
                    "current_key": "ci-api-key"
                  }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug)
        run: flutter build apk --debug --dart-define=CONVEX_URL=https://dummy.convex.cloud --dart-define=CLERK_PUBLISHABLE_KEY=pk_test_dummy

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
